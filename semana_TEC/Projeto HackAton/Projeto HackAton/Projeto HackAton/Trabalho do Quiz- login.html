    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center><h1>Login</h1></center>
    <form id="Logar" method="POST" action="Trabalho do Quiz - Login.php">
        <div>
            <center>
            <p>Email</p>
            <input placeholder="Digite Aqui" type="email" name="EMAIL" id="gm">
            <p>Senha</p>
            <input type="password" placeholder="Digite Aqui" name="SENHA" id="key">
            <p>Nome</p>
            <input type="text" placeholder="Digite Aqui" name="NOME" id="nick">
            </center>
        </div>
        <center><button type="submit">Logar</button></center>
    </form>
    <center>
        <form action="Trabalho do Quiz - Criar Conta.html">
            <button type="submit"> Criar CONTA</button>
        </form>
    </center>
   
    <script>
        var email = document.getElementById("gm")
        var senha = document.getElementById("key")
        var nome = document.getElementById("nick")
        const verificacao = document.getElementById("Logar")

        verificacao.addEventListener('submit', function(event){
           if(email.value.trim() === "" || senha.value.trim() === "" || nome.value.trim() === ""){
            alert("EMAIL, SENHA ou NOME não Digitado.")
            event.preventDefault();
           }
        });  
    </script>
</body>
</html>
